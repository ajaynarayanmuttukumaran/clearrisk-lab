run_name: wrong_way_risk_case
random_seed: 42
n_paths: 1200
time_horizon_days: 252
enable_wrong_way_risk: true
include_liquidity_closeout_cost: false
margin:
  method: gaussian_var
  confidence_level: 0.99
  margin_period_of_risk_days: 5
  anti_procyclicality_buffer: 0.02
  volatility_floor: 0.15
  lookback_window: 252
  concentration_addon: 0.04
  liquidity_addon: 0.04
waterfall:
  ccp_skin_in_game: 100000000
  assessment_cap_multiple: 0.2
  include_defaulter_df: true
  allow_vm_haircut_placeholder: false
  recovery_tool_placeholder: false
  default_fund_method: cover2
  default_fund_value: 0.0
scenarios:
  - scenario_name: correlated_stress
    drift: 0.02
    volatility: 0.32
    jump_probability: 0.02
    jump_size_distribution: normal(mean=-0.07,std=0.04)
    liquidity_spread_multiplier: 1.25
    stress_label: wrong_way_risk
members: []

