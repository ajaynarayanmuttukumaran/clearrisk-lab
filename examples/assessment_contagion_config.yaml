run_name: assessment_contagion_case
random_seed: 42
n_paths: 1200
time_horizon_days: 252
enable_wrong_way_risk: true
include_liquidity_closeout_cost: true
margin:
  method: buffered_var
  confidence_level: 0.99
  margin_period_of_risk_days: 5
  anti_procyclicality_buffer: 0.05
  volatility_floor: 0.18
  lookback_window: 252
  concentration_addon: 0.06
  liquidity_addon: 0.08
waterfall:
  ccp_skin_in_game: 100000000
  assessment_cap_multiple: 0.2
  include_defaulter_df: true
  allow_vm_haircut_placeholder: false
  recovery_tool_placeholder: false
  default_fund_method: stress_cover2
  default_fund_value: 0.0
scenarios:
  - scenario_name: assessment_contagion_stress
    drift: 0.01
    volatility: 0.36
    jump_probability: 0.03
    jump_size_distribution: normal(mean=-0.1,std=0.06)
    liquidity_spread_multiplier: 1.6
    stress_label: contagion
members: []

