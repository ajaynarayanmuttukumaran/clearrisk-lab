run_name: fat_tail_case
random_seed: 42
n_paths: 1500
time_horizon_days: 252
enable_wrong_way_risk: true
include_liquidity_closeout_cost: false
margin:
  method: gaussian_var
  confidence_level: 0.99
  margin_period_of_risk_days: 5
  anti_procyclicality_buffer: 0.01
  volatility_floor: 0.15
  lookback_window: 252
  concentration_addon: 0.03
  liquidity_addon: 0.05
waterfall:
  ccp_skin_in_game: 100000000
  assessment_cap_multiple: 0.2
  include_defaulter_df: true
  allow_vm_haircut_placeholder: false
  recovery_tool_placeholder: false
  default_fund_method: cover2
  default_fund_value: 0.0
scenarios:
  - scenario_name: fat_tail_student_t
    drift: 0.04
    volatility: 0.28
    jump_probability: 0.0
    jump_size_distribution: student_t_df5
    liquidity_spread_multiplier: 1.2
    stress_label: fat_tail
members: []

